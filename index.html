<style>

*{

padding:0;

}

body{

box-shadow:

@keyframes borderGlow{

from{

0 0 20px rgba(212,175,55,.4);

}

to{

box-shadow:
0 0 40px rgba(212,175,55,.8);

}

}

.badge{

}

.profile{

width:220px;

height:220px;

display:block;

margin:30px auto;

border-radius:24px;

object-fit:cover;

border:5px solid #d4af37;

box-shadow:0 0 25px rgba(212,175,55,.7);

}

h1{

text-align:center;

font-family:'Cinzel',serif;

color:#d4af37;

}

.subtitle{

text-align:center;

color:#fff;

font-size:18px;

margin-top:10px;

}

.colors{

.green{background:#008000;}

.telegram{

.telegram:hover{

.features{

.box{

.active{

footer{

text-align:center;

padding-top:18px;

.star{

position:absolute;

background:#fff;

@keyframes fall{

0%{

transform:translateY(-30px);

opacity:0;

}

50%{

opacity:1;

}

100%{

transform:translateY(700px);

}

</head>

<body>

<script>

let total=600;

setInterval(()=>{

let min=Math.floor(total/60);

let sec=total%60;

document.getElementById("min").innerHTML=min;

document.getElementById("sec").innerHTML=sec.toString().padStart(2,'0');

if(total>0){

total--;

}

},1000);

for(let i=0;i<40;i++){
